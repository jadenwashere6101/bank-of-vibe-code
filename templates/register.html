<!DOCTYPE html>
<html>
<head>
    <title>Create Account - Bank of a Vibe Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f8fc;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .header {
            background-color: #0f172a;
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            font-style: italic;
            color: #60a5fa;
            line-height: 1;
            transform: skew(-12deg);
        }

        .brand-text h1 {
            margin: 0;
            font-size: 30px;
        }

        .brand-text p {
            margin: 4px 0 0 0;
            color: #cbd5e1;
            font-size: 14px;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-card {
            background: white;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .form-card h2 {
            margin-top: 0;
            color: #2563eb;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <div class="logo">V</div>
            <div class="brand-text">
                <h1>Bank of a Vibe Code</h1>
                <p>Create a new account</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="form-card">
            <h2>Create Account</h2>

            {% if error %}
                <p style="color: #dc2626; font-weight: bold; margin-bottom: 18px;">{{ error }}</p>
            {% endif %}

            <form action="/register" method="POST">
                <label>Full Name</label>
                <input type="text" name="full_name" required>

                <label>Username</label>
                <input type="text" name="username" required>

                <label>Password</label>
                <input type="password" name="password" required>

                <label>Starting Checking Balance</label>
                <input type="number" step="0.01" name="checking_balance" value="0.00">

                <label>Starting Savings Balance</label>
                <input type="number" step="0.01" name="savings_balance" value="0.00">

                <button type="submit">Create Account</button>
            </form>

            <a class="back-link" href="/">Back to Home</a>
        </div>
    </div>

</body>
</html>
