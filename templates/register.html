<!DOCTYPE html>
<html>
<head>
    <title>Create Account - Bank of a Vibe Code</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="header">
        <div class="brand">
            <div class="logo">V</div>
            <div class="brand-text">
                <h1>Bank of a Vibe Code</h1>
                <p>Create a new account</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="form-card">
            <h2>Create Account</h2>

            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form action="/register" method="POST">
                <label>Full Name</label>
                <input type="text" name="full_name" required>

                <label>Username</label>
                <input type="text" name="username" required>

                <label>Password</label>
                <input type="password" name="password" required>

                <label>Starting Checking Balance</label>
                <input type="number" step="0.01" name="checking_balance" value="0.00">

                <label>Starting Savings Balance</label>
                <input type="number" step="0.01" name="savings_balance" value="0.00">

                <button type="submit">Create Account</button>
            </form>

            <a class="back-link" href="/">Back to Home</a>
        </div>
    </div>

</body>
</html>
