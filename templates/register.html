<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
</head>
<body>

    <h1>Create Account</h1>

    <form action="/register" method="POST">
        <label>Full Name:</label><br>
        <input type="text" name="full_name" required><br><br>

        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <label>Starting Checking Balance:</label><br>
        <input type="number" step="0.01" name="checking_balance" value="0.00"><br><br>

        <label>Starting Savings Balance:</label><br>
        <input type="number" step="0.01" name="savings_balance" value="0.00"><br><br>

        <button type="submit">Create Account</button>
    </form>

    <br>
    <a href="/">Back to Home</a>

</body>
</html>
